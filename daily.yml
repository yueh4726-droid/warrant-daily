name: 每日權證資料更新

on:
  schedule:
    - cron: '0 23 * * *'  # 台灣時間每天早上07:00 (UTC 23:00)
  workflow_dispatch:        # 允許手動觸發

jobs:
  fetch-warrants:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests

      - name: 抓取權證資料
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch.py

      - name: 推送更新資料
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git diff --staged --quiet || git commit -m "每日權證資料更新 $(date +'%Y-%m-%d %H:%M')"
          git push
